<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLearn Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}

.calc-container{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 0 40px rgba(139,92,246,.4);
}

.btn{
    transition:.3s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(255,255,255,.2);
}

.btn:active{
    transform:scale(.95);
}

#display{
    box-shadow:inset 0 0 15px rgba(255,255,255,.1);
}
</style>
</head>

<body class="flex justify-center items-center min-h-screen p-5">

<div class="calc-container w-full max-w-[700px] p-10 rounded-[40px]">

    <h1 class="text-center text-5xl font-bold text-white mb-8">
        🧮 SmartLearn Calculator
    </h1>

    <!-- Display -->
    <input
    id="display"
    type="text"
    readonly
    class="w-full h-28 bg-slate-800 text-white text-right text-5xl px-8 rounded-3xl mb-8">

    <!-- Buttons -->
    <div class="grid grid-cols-4 gap-5">

        <button onclick="clearDisplay()"
        class="btn bg-red-500 text-white h-24 rounded-3xl text-4xl">
        C
        </button>

        <button onclick="backspace()"
        class="btn bg-yellow-500 text-white h-24 rounded-3xl text-4xl">
        ⌫
        </button>

        <button onclick="add('%')"
        class="btn bg-orange-500 text-white h-24 rounded-3xl text-4xl">
        %
        </button>

        <button onclick="add('/')"
        class="btn bg-violet-600 text-white h-24 rounded-3xl text-4xl">
        ÷
        </button>


        <button onclick="add('7')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        7
        </button>

        <button onclick="add('8')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        8
        </button>

        <button onclick="add('9')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        9
        </button>

        <button onclick="add('*')"
        class="btn bg-violet-600 text-white h-24 rounded-3xl text-4xl">
        ×
        </button>


        <button onclick="add('4')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        4
        </button>

        <button onclick="add('5')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        5
        </button>

        <button onclick="add('6')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        6
        </button>

        <button onclick="add('-')"
        class="btn bg-violet-600 text-white h-24 rounded-3xl text-4xl">
        −
        </button>


        <button onclick="add('1')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        1
        </button>

        <button onclick="add('2')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        2
        </button>

        <button onclick="add('3')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        3
        </button>

        <button onclick="add('+')"
        class="btn bg-violet-600 text-white h-24 rounded-3xl text-4xl">
        +
        </button>


        <button onclick="add('0')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl col-span-2">
        0
        </button>

        <button onclick="add('.')"
        class="btn bg-slate-700 text-white h-24 rounded-3xl text-4xl">
        .
        </button>

        <button onclick="calculate()"
        class="btn bg-green-500 text-white h-24 rounded-3xl text-4xl">
        =
        </button>

    </div>

</div>


<script>

function add(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function backspace(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0,-1);
}

function calculate(){

    let expression =
    document.getElementById("display").value;

    try{

        document.getElementById("display").value =
        eval(expression);

    }

    catch{

        document.getElementById("display").value =
        "Error";

    }

}

// Keyboard support
document.addEventListener("keydown",(event)=>{

    const key = event.key;

    if(!isNaN(key) || "+-*/.%".includes(key)){
        add(key);
    }

    if(key==="Enter"){
        calculate();
    }

    if(key==="Backspace"){
        backspace();
    }

    if(key==="Escape"){
        clearDisplay();
    }

});

</script>

</body>
</html>
